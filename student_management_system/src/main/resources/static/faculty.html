<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Faculty Management</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>SMS</h2>

    <a href="dashboard.html">🏠 Dashboard</a>

    <a href="students.html">🎓 Students</a>

    <a href="faculty.html" class="active">👨‍🏫 Faculty</a>

    <a href="courses.html">📚 Courses</a>

    <a href="attendance.html">📅 Attendance</a>

    <a href="marks.html">📝 Marks</a>

</div>

<div class="content">

    <h1>Faculty Management</h1>

    <div class="form-container">

        <h2>Add Faculty</h2>

        <div class="form-grid">

            <input
                    type="text"
                    id="facultyName"
                    placeholder="Faculty Name">

            <input
                    type="email"
                    id="email"
                    placeholder="Email">

            <input
                    type="text"
                    id="phone"
                    placeholder="Phone">

            <input
                    type="text"
                    id="department"
                    placeholder="Department">

            <input
                    type="text"
                    id="designation"
                    placeholder="Designation">



        </div>

        <br>

        <button onclick="addFaculty()">
            Save Faculty
        </button>

    </div>

    <div class="table-container">

        <h2>Faculty List</h2>

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Department</th>

                <th>Designation</th>

                <th>Email</th>

                <th>Phone</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="facultyTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/faculty.js"></script>

</body>
</html>
