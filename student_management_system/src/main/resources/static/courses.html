<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Course Management</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>SMS</h2>

    <a href="dashboard.html">🏠 Dashboard</a>

    <a href="students.html">🎓 Students</a>

    <a href="faculty.html">👨‍🏫 Faculty</a>

    <a href="courses.html" class="active">📚 Courses</a>

    <a href="attendance.html">📅 Attendance</a>

    <a href="marks.html">📝 Marks</a>

</div>

<div class="content">

    <h1>Course Management</h1>

    <div class="form-container">

        <h2>Add Course</h2>

        <div class="form-grid">

            <input
                    type="text"
                    id="courseCode"
                    placeholder="Course Code">

            <input
                    type="text"
                    id="courseName"
                    placeholder="Course Name">

            <input
                    type="text"
                    id="department"
                    placeholder="Department">

            <input
                    type="number"
                    id="credits"
                    placeholder="Credits">

            <input
                    type="number"
                    id="semester"
                    placeholder="Semester">

            <input
                    type="number"
                    id="facultyId"
                    placeholder="Faculty ID">

        </div>

        <br>

        <button onclick="addCourse()">
            Save Course
        </button>

    </div>

    <div class="table-container">

        <h2>Course List</h2>

        <table>

            <thead>

            <tr>

                <th>ID</th>
                <th>Code</th>
                <th>Name</th>
                <th>Department</th>
                <th>Credits</th>
                <th>Semester</th>
                <th>Faculty</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody id="courseTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/courses.js"></script>

</body>
</html>
